services:
  postgres-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mankind_george
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-db:5432/mankind_george
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 7d
      PORT: 3001
      FRONTEND_URL: http://localhost
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      PRISMA_CLI_QUERY_ENGINE_TYPE: library
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres-db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NUXT_PUBLIC_API_BASE: ""
      NUXT_API_BASE_DIRECT: http://backend:3001
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  uploads:
  backend_node_modules:
  frontend_node_modules:
